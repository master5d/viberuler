name: ci
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: git config --global user.email ci@viberuler.test && git config --global user.name CI
        shell: bash
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run check -w viberuler-api
      - run: npx wrangler types && git diff --exit-code worker-configuration.d.ts
        working-directory: packages/worker
        if: runner.os == 'Linux'
      - run: node packages/cli/dist/bin.js --no-color --scan-dir .
